version: "3.8"

services:
  front:
    image: harmony-front
    build:
      context: ./frontend-barberia
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_API_TIMEOUT_MS: ${VITE_API_TIMEOUT_MS:-15000}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        VITE_HOME_FEATURED_BARBER_ID: ${VITE_HOME_FEATURED_BARBER_ID:-2}
        VITE_CLOUDINARY_CLOUD_NAME: ${VITE_CLOUDINARY_CLOUD_NAME:-}
        VITE_CLOUDINARY_UPLOAD_PRESET: ${VITE_CLOUDINARY_UPLOAD_PRESET:-}
    ports:
      - "80:80"
    depends_on:
      - service
    restart: unless-stopped

  service:
    image: harmony-service
    build:
      context: ./tfg-barberia
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-15}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost}
      APP_NOTIFICATIONS_EMAIL_ENABLED: ${APP_NOTIFICATIONS_EMAIL_ENABLED:-false}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-}
    restart: unless-stopped
