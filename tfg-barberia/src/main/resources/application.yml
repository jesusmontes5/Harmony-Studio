spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: TFG-Barberia

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/TFG_Barberia?useUnicode=true&serverTimezone=UTC}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: ${JPA_SHOW_SQL:false}
  sql:
    init:
      mode: never
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true


logging:
  level:
    root: INFO
    org.vedruna.barberia: ${LOG_LEVEL_APP:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:WARN}
    org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer: ERROR
  file:
    name: logs/app.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

springdoc:
  writer-with-order-by-keys: true
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      roles: ADMIN
  prometheus:
    metrics:
      export:
        enabled: true

security:
  jwt:
    secret: ${JWT_SECRET:ZGV2LW9ubHktY2hhbmdlLW1lLWJhcmJlcmlhLXNlY3JldA==}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:15}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://192.168.1.195:5173,http://192.168.1.195:5174,https://*.trycloudflare.com}
  notifications:
    email-enabled: ${APP_NOTIFICATIONS_EMAIL_ENABLED:false}
    from: ${MAIL_FROM:${spring.mail.username}}
    process-cron: ${APP_NOTIFICATIONS_PROCESS_CRON:0 */1 * * * *}

